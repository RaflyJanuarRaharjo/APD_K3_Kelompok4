version: '3.8'

services:
  # ── Database PostgreSQL ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: apd_postgres
    restart: always
    environment:
      POSTGRES_DB:       apd_monitor
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REST API Backend (FastAPI) ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apd_backend
    restart: always
    command: uvicorn app.backend:app --host 0.0.0.0 --port 8000
    # 🔥 FIX UTAMA: Menyuntikkan file .env agar DB_PASSWORD=postgres dibaca real-time
    env_file:
      - .env
    volumes:
      - ./captures:/app/captures
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Dashboard Streamlit ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apd_dashboard
    restart: always
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    # 🔥 PENTING: Izinkan Docker mengakses hardware webcam laptop internal (/dev/video0)
    devices:
      - "/dev/video0:/dev/video0"
    # Menyuntikkan .env ke dashboard agar password login admin123 sinkron
    env_file:
      - .env
    environment:
      - CAPTURE_DIR=/app/captures
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./captures:/app/captures
      - ./runs:/app/runs
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  pg_data:
    # Mengunci volume agar dibersihkan dengan benar saat compose down
    name: apd_project_pg_data